services:
  engram:
    build: .
    volumes:
      - ./data:/data
    environment:
      - ENGRAM_DB_PATH=/data/memory.db
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      sh -c "
        echo 'Waiting for Ollama to boot...';
        while ! curl -s http://ollama:11434/api/tags > /dev/null; do
          sleep 1;
        done;
        echo 'Ollama is up. Pulling nomic-embed-text model...';
        curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}';
        echo 'Model ready!';
      "

volumes:
  ollama_data:
