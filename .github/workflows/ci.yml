name: Engram CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'
    
    - name: Dependency smoke test (SQLite extensions)
      run: |
        python -c "import sqlean; import sqlite_vec; print('SQLite extensions loaded successfully')"

    - name: Lint with ruff
      run: |
        python -m ruff check src/ tests/ benchmarks/

    - name: Typecheck with pyright
      env:
        PYTHONPATH: .
      run: |
        python -m pyright
        
    - name: Test with pytest (with coverage report)
      env:
        PYTHONPATH: .
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=term-missing

    - name: Retrieval benchmark (full query set, R@5 gate)
      env:
        ENGRAM_DB_PATH: ${{ runner.temp }}/engram_bench_ci.db
        PYTHONPATH: .
      run: |
        python benchmarks/engram_retrieval_bench.py --fail-under-r5 0.90

  degraded-retrieval:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'

    - name: FTS-only degraded path (no Ollama)
      env:
        ENGRAM_DB_PATH: ${{ runner.temp }}/engram_bench_degraded.db
        ENGRAM_EMBED_URL: disabled
        PYTHONPATH: .
      run: |
        python benchmarks/engram_retrieval_bench.py --mode fts_only --fail-under-r5 0.50
