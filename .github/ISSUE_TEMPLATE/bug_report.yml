name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug. Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what actually happened?
      placeholder: I ran `engram search "..."` and expected ..., but got ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands or MCP calls, in order.
      placeholder: |
        1. engram init
        2. engram add mistake ...
        3. engram search "..."
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python3 --version`
      placeholder: "3.11.7"
    validations:
      required: true
  - type: input
    id: sqlite-version
    attributes:
      label: SQLite version
      description: Output of `python3 -c "import sqlite3; print(sqlite3.sqlite_version)"`
      placeholder: "3.45.1"
    validations:
      required: false
  - type: textarea
    id: doctor
    attributes:
      label: engram doctor output
      description: Paste the output of `engram doctor` (redact anything sensitive).
      render: text
    validations:
      required: false
